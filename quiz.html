<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Quiz App</title>
  <style>
    /* Center layout */
    body {
      background-color: #eef2f3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }

    /* Main Quiz Box */
    .quiz-container {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      width: 450px;
    }

    h2 {
      margin-top: 0;
      color: #333;
    }

    /* Option Buttons Styling */
    .options-btn {
      display: block;
      width: 100%;
      background-color: #f0f0f0;
      color: #333;
      border: 1px solid #ddd;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      font-size: 16px;
    }

    .options-btn:hover {
      background-color: #e2e2e2;
    }

    /* Next Button */
    #nextBtn {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      float: right;
      margin-top: 15px;
    }

    #nextBtn:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>

  <div class="quiz-container">
    <!-- Questions and Options will load dynamically via JS -->
    <div id="quiz-box">
      <h2 id="question">Question will appear here...</h2>
      <div id="options-container"></div>
      <button id="nextBtn" onclick="loadNextQuestion()">Next</button>
    </div>
    
    <!-- Result box hidden initially -->
    <div id="result-box" style="display: none; text-align: center;">
      <h2>Quiz Completed! 🎉</h2>
      <p id="score-text" style="font-size: 24px; font-weight: bold; color: #28a745;"></p>
      <button onclick="location.reload()" style="padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 6px; border: 1px solid #ccc; background-color: #fff;">Play Again</button>
    </div>
  </div>

  <script>
    // 1. Question Data (Array of Objects)
    const quizData = [
      {
        question: "What does HTML stand for?",
        options: ["Hyper Text Markup Language", "High Tech Machine Language", "Hyper Link Mark Language", "Home Text Multi Language"],
        correct: 0
      },
      {
        question: "What is CSS used for?",
        options: ["For managing databases", "For styling and designing websites", "For running servers", "For writing logical algorithms"],
        correct: 1
      },
      {
        question: "What does JS stand for?",
        options: ["JustScript", "JavaSuper", "JavaScript", "JodiScript"],
        correct: 2
      }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let selectedOptionIndex = null;

    // 2. Function to display question and options on screen
    function showQuestion() {
      selectedOptionIndex = null;
      const currentQuiz = quizData[currentQuestionIndex];
      
      // Update question text
      document.getElementById('question').textContent = currentQuiz.question;
      
      // Generate option buttons
      const optionsContainer = document.getElementById('options-container');
      optionsContainer.innerHTML = ''; // Clear old options

      currentQuiz.options.forEach((option, index) => {
        const button = document.createElement('button');
        button.textContent = option;
        button.className = 'options-btn';
        
        // Change color on selecting an option
        button.onclick = function() {
          selectedOptionIndex = index;
          // Reset all buttons to normal color first
          const allButtons = document.querySelectorAll('.options-btn');
          allButtons.forEach(btn => btn.style.backgroundColor = '#f0f0f0');
          // Highlight only the selected button
          button.style.backgroundColor = '#d1ecf1';
        };
        
        optionsContainer.appendChild(button);
      });
    }

    // 3. Logic when Next button is clicked
    function loadNextQuestion() {
      if (selectedOptionIndex === null) {
        alert("Please select an option first!");
        return;
      }

      // Check answer score
      if (selectedOptionIndex === quizData[currentQuestionIndex].correct) {
        score++;
      }

      currentQuestionIndex++;

      // If more questions remain, load next; otherwise show results
      if (currentQuestionIndex < quizData.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    // 4. Function to display results
    function showResult() {
      document.getElementById('quiz-box').style.display = 'none';
      document.getElementById('result-box').style.display = 'block';
      document.getElementById('score-text').textContent = "Your Score: " + score + " / " + quizData.length;
    }

    // Initialize quiz on page load
    showQuestion();
  </script>

</body>
</html>
