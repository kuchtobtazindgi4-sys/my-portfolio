<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My To-Do List</title>
  <style>
    /* 1. Center the app perfectly on the screen */
    body {
      background-color: #f7f9fc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }

    /* 2. Main Container Box */
    .todo-box {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      width: 350px;
    }

    h2 {
      margin-top: 0;
      color: #333;
      text-align: center;
    }

    /* 3. Layout for Input and Add Button */
    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    #taskInput {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    #addBtn {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    #addBtn:hover {
      background-color: #0056b3;
    }

    /* 4. List Items Styling */
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      background-color: #f8f9fa;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid #007bff;
    }

    /* Delete Button */
    .delete-btn {
      background-color: #dc3545;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    .delete-btn:hover {
      background-color: #bd2130;
    }
  </style>
</head>
<body>

  <!-- To-Do App Structure -->
  <div class="todo-box">
    <h2>My To-Do List</h2>
    
    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Write a new task...">
      <button id="addBtn" onclick="addTask()">Add</button>
    </div>

    <!-- The list of tasks will be displayed here -->
    <ul id="taskList"></ul>
  </div>

  <!-- JavaScript Logic -->
  <script>
    function addTask() {
      const input = document.getElementById('taskInput');
      const taskText = input.value.trim(); // .trim() removes extra whitespaces

      // Show alert if the input field is empty
      if (taskText === "") {
        alert("Please write something first!");
        return;
      }

      const ul = document.getElementById('taskList');

      // 1. Create a new <li> element (list item)
      const li = document.createElement('li');
      li.textContent = taskText;

      // 2. Create a new Delete Button
      const delBtn = document.createElement('button');
      delBtn.textContent = 'Delete';
      delBtn.className = 'delete-btn';

      // 3. Remove the item when delete button is clicked
      delBtn.onclick = function() {
        li.remove();
      };

      // 4. Append button to list item, and list item to the main list
      li.appendChild(delBtn);
      ul.appendChild(li);

      // 5. Clear the input box after adding the task
      input.value = "";
    }
  </script>

</body>
</html>
