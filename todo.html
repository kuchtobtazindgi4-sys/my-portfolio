<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meri To-Do List</title>
  <style>
    /* 1. App ko screen ke bilkul center mein lane ke liye */
    body {
      background-color: #f7f9fc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }

    /* 2. Main Container Box */
    .todo-box {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      width: 350px;
    }

    h2 {
      margin-top: 0;
      color: #333;
      text-align: center;
    }

    /* 3. Input aur Add Button ka Layout */
    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    #taskInput {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    #addBtn {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    #addBtn:hover {
      background-color: #0056b3;
    }

    /* 4. List Items ki Styling */
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      background-color: #f8f9fa;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid #007bff;
    }

    /* Delete Button */
    .delete-btn {
      background-color: #dc3545;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    .delete-btn:hover {
      background-color: #bd2130;
    }
  </style>
</head>
<body>

  <!-- To-Do App Structure -->
  <div class="todo-box">
    <h2>My To-Do List</h2>
    
    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Naya kaam likhein...">
      <button id="addBtn" onclick="addTask()">Add</button>
    </div>

    <!-- Yahan saare kaamon ki list show hogi -->
    <ul id="taskList"></ul>
  </div>

  <!-- JavaScript Logic -->
  <script>
    function addTask() {
      const input = document.getElementById('taskInput');
      const taskText = input.value.trim(); // .trim() faltu khali jagah khatam karta hai

      // Agar input khali ho to alert dikhayein
      if (taskText === "") {
        alert("Pehle kuch likhein!");
        return;
      }

      const ul = document.getElementById('taskList');

      // 1. Naya <li> element (list item) banana
      const li = document.createElement('li');
      li.textContent = taskText;

      // 2. Naya Delete Button banana
      const delBtn = document.createElement('button');
      delBtn.textContent = 'Delete';
      delBtn.className = 'delete-btn';

      // 3. Delete button par click karne se line remove ho jaye
      delBtn.onclick = function() {
        li.remove();
      };

      // 4. Button ko list item ke andar daalna aur list item ko main list mein daalna
      li.appendChild(delBtn);
      ul.appendChild(li);

      // 5. Kaam add hone ke baad input box ko dobara khali karna
      input.value = "";
    }
  </script>

</body>
</html>

</body>
</html>
