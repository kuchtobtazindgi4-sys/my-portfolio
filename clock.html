<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Digital Clock</title>
  <style>
    /* 1. Center the clock perfectly on the screen */
    body {
      background-color: #1a1a2e; /* Dark theme background */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Courier New', Courier, monospace; /* Digital look font */
    }

    /* 2. Main container box for the clock */
    .clock-container {
      background-color: #16213e;
      padding: 30px 50px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 2px solid #0f3460;
    }

    /* 3. Styling for the numbers */
    .clock-text {
      font-size: 60px;
      color: #00fff5; /* Neon Cyan color */
      letter-spacing: 5px;
      text-shadow: 0 0 20px #00fff5; /* Glowing effect */
    }
  </style>
</head>
<body>

  <!-- Clock Structure -->
  <div class="clock-container">
    <div id="myClock" class="clock-text">00:00:00</div>
  </div>

  <!-- JavaScript for Live Time Logic -->
  <script>
    function updateClock() {
      // 1. Fetch live date and time data
      const now = new Date();
      
      let hours = now.getHours();
      let minutes = now.getMinutes();
      let seconds = now.getSeconds();

      // 2. Add leading zero if the number is less than 10 (e.g., 05 seconds)
      if (hours < 10) hours = '0' + hours;
      if (minutes < 10) minutes = '0' + minutes;
      if (seconds < 10) seconds = '0' + seconds;

      // 3. Format the time string
      const timeString = hours + ':' + minutes + ':' + seconds;

      // 4. Display the time inside the HTML element
      document.getElementById('myClock').textContent = timeString;
    }

    // 5. Run this function every 1 second (1000 milliseconds)
    setInterval(updateClock, 1000);

    // Initialize the clock immediately on page load
    updateClock();
  </script>

</body>
</html>
