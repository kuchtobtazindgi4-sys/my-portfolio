<body><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meri Digital Clock</title>
  <style>
    /* 1. Clock ko screen ke bilkul center mein lane ke liye */
    body {
      background-color: #1a1a2e; /* Dark theme background */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Courier New', Courier, monospace; /* Digital look font */
    }

    /* 2. Clock ka main box */
    .clock-container {
      background-color: #16213e;
      padding: 30px 50px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 2px solid #0f3460;
    }

    /* 3. Numbers ki styling */
    .clock-text {
      font-size: 60px;
      color: #00fff5; /* Neon Cyan color */
      letter-spacing: 5px;
      text-shadow: 0 0 20px #00fff5; /* Glowing effect */
    }
  </style>
</head>
<body>

  <!-- Clock ka Structure -->
  <div class="clock-container">
    <div id="myClock" class="clock-text">00:00:00</div>
  </div>

  <!-- JavaScript ka Jadu (Live Time Logic) -->
  <script>
    function updateClock() {
      // 1. Live time ka data lena
      const now = new Date();
      
      let hours = now.getHours();
      let minutes = now.getMinutes();
      let seconds = now.getSeconds();

      // 2. Agar number 10 se chota ho to shuru mein '0' lagana (e.g. 05 seconds)
      if (hours < 10) hours = '0' + hours;
      if (minutes < 10) minutes = '0' + minutes;
      if (seconds < 10) seconds = '0' + seconds;

      // 3. Time ko text ki tarah jorna
      const timeString = hours + ':' + minutes + ':' + seconds;

      // 4. HTML ke andar time ko show karna
      document.getElementById('myClock').textContent = timeString;
    }

    // 5. Is function ko har 1 second (1000 milliseconds) baad chalana
    setInterval(updateClock, 1000);

    // Pehli baar clock ko foran chalane ke liye
    updateClock();
  </script>

</body>
</html>

    
</body>
</html>
